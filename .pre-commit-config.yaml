# All hooks run in the project env via `uv run` (language: system) so they use
# the pinned dev tools from uv.lock and resolve numpy/matplotlib/modal stubs.
# This mirrors the CI steps exactly and avoids pre-commit building isolated
# hook envs against a private package index.
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint, --fix)
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true
      - id: mypy
        name: mypy (strict)
        entry: uv run mypy src
        language: system
        pass_filenames: false
        types: [python]
      - id: pytest
        name: pytest
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-push]
